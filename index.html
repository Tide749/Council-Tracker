<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELincs 4 You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman';
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #00005a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #000000;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            cursor: pointer;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #0066cc;
            border-radius: 5px;
            font-size: 16px;
        }

        .councillor-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .councillor-card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .councillor-name {
            font-size: 20px;
            font-weight: bold;
            color: #00005a;
        }

        .councillor-info {
            color: #666;
            margin-top: 5px;
        }

        .party-label {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .labour {
            background-color: #e4003b;
            color: white;
        }

        .conservative {
            background-color: #0087dc;
            color: white;
        }
        
        .reform {
            background-color: #00ffff;
            color: black;
        }

        .lib-dem {
            background-color: #faa61a;
            color: black;
        }

        .independent {
            background-color: #999;
            color: white;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        footer {
            background-color: #f0f0f0;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid #ddd;
        }
/* ============================================
   RECENT VOTES PAGE STYLES
   ============================================ */
.votes-page h2 {
  font-size: 2em;
  margin-bottom: 1.5em;
}

.motions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 1.5em;
  margin-bottom: 2em;
}

.motion-card {
  background: white;
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 1.5em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.motion-card:hover {
  border-color: #0087dc;
  box-shadow: 0 4px 12px rgba(0, 135, 220, 0.15);
  transform: translateY(-2px);
}

.motion-card h3 {
  margin: 0 0 0.5em 0;
  font-size: 1.2em;
  color: #333;
}

.motion-date {
  font-size: 0.9em;
  color: #666;
  margin: 0 0 1em 0;
}

.vote-tally {
  display: flex;
  gap: 1em;
  margin-bottom: 1em;
  justify-content: space-around;
}

.tally-item {
  text-align: center;
  padding: 0.75em;
  border-radius: 4px;
  font-weight: bold;
}

.tally-item.for {
  background-color: #e4f5e9;
  color: #2e7d32;
}

.tally-item.against {
  background-color: #ffebee;
  color: #c62828;
}

.tally-item.abstain {
  background-color: #f3e5f5;
  color: #6a1b9a;
}

.tally-item .number {
  display: block;
  font-size: 1.5em;
}

.tally-item .label {
  display: block;
  font-size: 0.8em;
}

.motion-result {
  margin: 0;
  padding: 0.5em 1em;
  border-radius: 4px;
  font-weight: bold;
  text-align: center;
}

.motion-result.passed {
  background-color: #c8e6c9;
  color: #1b5e20;
}

.motion-result.failed {
  background-color: #ffcdd2;
  color: #b71c1c;
}

/* ============================================
   MOTION DETAIL PAGE STYLES
   ============================================ */
.motion-detail-page {
  max-width: 900px;
  margin: 0 auto;
  padding: 1em 0;
}

.back-button {
  background: #0087dc;
  color: white;
  border: none;
  padding: 0.75em 1.5em;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1em;
  margin-bottom: 1.5em;
  transition: background 0.3s;
}

.back-button:hover {
  background: #006aad;
}

.motion-header h2 {
  margin: 0 0 0.5em 0;
  font-size: 2em;
}

.motion-header .motion-date {
  color: #666;
  margin: 0;
}

.motion-info {
  background: #f9f9f9;
  padding: 1.5em;
  border-radius: 8px;
  margin: 1.5em 0;
}

.motion-info .summary {
  font-size: 1.1em;
  font-weight: bold;
  margin: 0 0 1em 0;
  color: #333;
}

.motion-info .details {
  margin: 0;
  color: #666;
  line-height: 1.6;
}

.results-summary {
  background: white;
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 1.5em;
  margin: 1.5em 0;
}

.results-summary h3 {
  margin: 0 0 1em 0;
}

.result-badge {
  display: inline-block;
  padding: 0.75em 1.5em;
  border-radius: 4px;
  font-weight: bold;
  margin-bottom: 1em;
}

.result-badge.passed {
  background-color: #c8e6c9;
  color: #1b5e20;
}

.result-badge.failed {
  background-color: #ffcdd2;
  color: #b71c1c;
}

.vote-breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1em;
}

.vote-stat {
  text-align: center;
  padding: 1em;
  background: #f5f5f5;
  border-radius: 4px;
}

.vote-count {
  display: block;
  font-size: 2em;
  font-weight: bold;
  margin-bottom: 0.5em;
}

.vote-count.for {
  color: #2e7d32;
}

.vote-count.against {
  color: #c62828;
}

.vote-count.abstain {
  color: #6a1b9a;
}

.vote-label {
  display: block;
  color: #666;
  font-size: 0.9em;
}

.councillor-votes {
  background: white;
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 1.5em;
  margin: 1.5em 0;
}

.councillor-votes h3 {
  margin: 0 0 1em 0;
}

.councillor-vote {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  align-items: center;
  padding: 0.75em;
  border-bottom: 1px solid #eee;
  gap: 1em;
}

.councillor-vote:last-child {
  border-bottom: none;
}

.councillor-name {
  font-weight: bold;
  color: #333;
}

.party-badge {
  color: white;
  padding: 0.4em 0.8em;
  border-radius: 4px;
  font-size: 0.9em;
  text-align: center;
}

.vote-badge {
  padding: 0.4em 0.8em;
  border-radius: 4px;
  font-weight: bold;
  font-size: 0.9em;
  text-align: center;
}

.vote-badge.for {
  background-color: #e8f5e9;
  color: #2e7d32;
}

.vote-badge.against {
  background-color: #ffebee;
  color: #c62828;
}

.vote-badge.abstain {
  background-color: #f3e5f5;
  color: #6a1b9a;
}
    </style>
</head>
<body>

<header>
    <h1>NELincs 4 You</h1>
    <p>From Dock Tower to Dixon Woods</p>
</header>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('councillors')">Councillors</a>
    <a onclick="showPage('votes')">Recent Votes</a>
</nav>

<div class="container">

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <h2>Welcome</h2>
        <p>Search for your local councillor to see what they've been voting on.</p>
        <input type="text" class="search-bar" id="searchHome" placeholder="Search by name or ward...">
        <div id="searchResults"></div>
    </div>

    <!-- COUNCILLORS PAGE -->
    <div id="councillors" class="page">
        <h2>Councillors</h2>
        <input type="text" class="search-bar" id="searchCouncillors" placeholder="Filter by name or ward...">
        <div id="councillorsList"></div>
    </div>

    <!-- VOTES PAGE -->
  <div id="votes" class="page">
    <div id="votes-container"></div>
</div>

</div>

<footer>
    <p>&copy; 2026   NELincs 4 You   &hearts;</p>
</footer>

<script>
    // FAKE DATA - Replace with real data later
    const councillors = [
        { id: 1, name: "Marian Jervis", ward: "Croft Baker", party: "Labour" },
        { id: 2, name: "Malcolm Morland", ward: "Croft Baker", party: "Labour" },
        { id: 3, name: "Oliver Freeston", ward: "Croft Baker", party: "Reform" },
        { id: 4, name: "Stephen Beasant", ward: "East Marsh", party: "Lib-Dem" },
        { id: 5, name: "Nicola Aisthorpe", ward: "East Marsh", party: "Lib-Dem" },
        { id: 6, name: "Loyd Emmerson", ward: "East Marsh", party: "Lib-Dem" },
    ];

    // Show/hide pages
    function showPage(pageName) {
        const pages = document.querySelectorAll('.page');
        pages.forEach(page => page.classList.remove('active'));
        document.getElementById(pageName).classList.add('active');
        
        if (pageName === 'councillors') {
    displayCouncillors(councillors);
} else if (pageName === 'votes') {
    currentView = "recent-votes";
    selectedMotionId = null;
    render();
     }
     }

    // Display councillors
    function displayCouncillors(list) {
        const html = list.map(c => `
            <div class="councillor-card">
                <div class="councillor-name">${c.name}</div>
                <div class="councillor-info">
                    <strong>Ward:</strong> ${c.ward}<br>
                    <span class="party-label ${c.party.toLowerCase().replace(' ', '-')}">${c.party}</span>
                </div>
            </div>
        `).join('');
        document.getElementById('councillorsList').innerHTML = html;
    }

    // Search functionality
    document.getElementById('searchCouncillors')?.addEventListener('keyup', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = councillors.filter(c => 
            c.name.toLowerCase().includes(query) || 
            c.ward.toLowerCase().includes(query)
        );
        displayCouncillors(filtered);
    });

    document.getElementById('searchHome')?.addEventListener('keyup', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = councillors.filter(c => 
            c.name.toLowerCase().includes(query) || 
            c.ward.toLowerCase().includes(query)
        );
        const html = filtered.map(c => `
            <div class="councillor-card">
                <div class="councillor-name">${c.name}</div>
                <div class="councillor-info">
                    <strong>Ward:</strong> ${c.ward}<br>
                    <span class="party-label ${c.party.toLowerCase().replace(' ', '-')}">${c.party}</span>
                </div>
            </div>
        `).join('');
        document.getElementById('searchResults').innerHTML = html;
    });

    // Initialize
    displayCouncillors(councillors);

// ============================================
// DATA STRUCTURE
// ============================================
const motions = [
  {
    id: 1,
    title: "Election of Oliver Freeston as Council Leader",
    date: "2026-07-15",
    result: "Passed",
    summary: "Proposal to:<br>1. Remove Phillip Jackson (Conservative) as council leader.<br>2. Appoint Oliver Freeston (Reform) as council leader.",
    details: "'The Council considered a Notice of Motion, proposed by Councillor Freeston and seconded by Councillor Grice, submitted in accordance with the Council’s Standing Orders and Section 9IA of the Local Government Act 2000, as set out below: This Council notes: <br> 1. That under section 9IA of the Local Government Act 2000, the Council may remove the Leader of the Council by resolution of Full Council; <br> 2. That the Leader of the Council holds responsibility for the discharge of executive functions and political leadership of the authority; <br> 3. That it is the responsibility of Full Council to ensure that the authority continues to operate with effective leadership, accountability and confidence.This Council therefore resolves: <br> 1. To remove Councillor Philip Jackson from the position of Leader of North East Lincolnshire Council with immediate effect pursuant to section 9IA of the Local Government Act 2000 and the Council’s Constitution. <br> 2. To appoint Councillor Oliver Freeston as Leader of North East Lincolnshire Council with immediate effect, to hold office in accordance with the provisions of the Local Government Act 2000 and the Council’s Constitution.'",
    votes: {
      for: 17,
      against: 9,
      abstain: 13
    },
    breakdown: [
      { name: "Councillor Jane Smith", party: "Labour", vote: "For" },
      { name: "Councillor Tom Brown", party: "Labour", vote: "For" },
      { name: "Councillor Sarah Jones", party: "Conservative", vote: "Against" },
      { name: "Councillor Mike Wilson", party: "Conservative", vote: "Against" },
      { name: "Councillor Lee Chen", party: "Liberal Democrat", vote: "For" },
      // Add more as needed
    ]
  },
  {
    id: 2,
    title: "Green Infrastructure Initiative",
    date: "2026-07-10",
    result: "Passed",
    summary: "Investment in green spaces and sustainable transport across the borough.",
    details: "A comprehensive initiative to plant 5,000 trees, create new cycle paths, and upgrade bus infrastructure to reduce carbon emissions.",
    votes: {
      for: 28,
      against: 12,
      abstain: 2
    },
    breakdown: [
      { name: "Councillor Amy Lee", party: "Labour", vote: "For" },
      { name: "Councillor Robert Davis", party: "Conservative", vote: "Against" },
      // Add more as needed
    ]
  },
  {
    id: 3,
    title: "Council Tax Freeze",
    date: "2026-07-05",
    result: "Failed",
    summary: "Proposal to freeze council tax rates for the next financial year.",
    details: "Motion to maintain council tax at current levels, arguing residents face sufficient financial pressure. Budget impact assessment included.",
    votes: {
      for: 18,
      against: 22,
      abstain: 2
    },
    breakdown: [
      { name: "Councillor Peter Graham", party: "Conservative", vote: "For" },
      { name: "Councillor Linda Thompson", party: "Labour", vote: "Against" },
      // Add more as needed
    ]
  }
];

// Party colors
const partyColors = {
  "Labour": "#e4003b",
  "Conservative": "#0087dc",
  "Reform": "#00ffff",
  "Liberal Democrat": "#faa61a",
  "Independent": "#999"
};

// ============================================
// ROUTING & VIEW MANAGEMENT
// ============================================
let currentView = "recent-votes";
let selectedMotionId = null;

function navigateToMotion(motionId) {
  currentView = "motion-detail";
  selectedMotionId = motionId;
  render();
}

function navigateBackToVotes() {
  currentView = "recent-votes";
  selectedMotionId = null;
  render();
}

// ============================================
// RECENT VOTES PAGE
// ============================================
function renderRecentVotes() {
  const votesHTML = motions.map(motion => `
    <div class="motion-card" onclick="navigateToMotion(${motion.id})">
      <h3>${motion.title}</h3>
      <p class="motion-date">${new Date(motion.date).toLocaleDateString()}</p>
      <div class="vote-tally">
        <div class="tally-item for">
          <span class="number">${motion.votes.for}</span>
          <span class="label">For</span>
        </div>
         <div class="tally-item abstain">
          <span class="number">${motion.votes.abstain}</span>
          <span class="label">Abstain</span>
        </div>
        <div class="tally-item against">
          <span class="number">${motion.votes.against}</span>
          <span class="label">Against</span>
        </div>
      </div>
      <p class="motion-result ${motion.result.toLowerCase()}">${motion.result}</p>
    </div>
  `).join('');

  return `
    <div class="votes-page">
      <h2>Recent Votes</h2>
      <div class="motions-grid">
        ${votesHTML}
      </div>
    </div>
  `;
}

// ============================================
// MOTION DETAIL PAGE
// ============================================
function renderMotionDetail() {
  const motion = motions.find(m => m.id === selectedMotionId);
  if (!motion) return "Motion not found";

  const breakdownHTML = motion.breakdown.map(vote => `
    <div class="councillor-vote">
      <span class="councillor-name">${vote.name}</span>
      <span class="party-badge" style="background-color: ${partyColors[vote.party]}">${vote.party}</span>
      <span class="vote-badge ${vote.vote.toLowerCase()}">${vote.vote}</span>
    </div>
  `).join('');

  return `
    <div class="motion-detail-page">
      <button class="back-button" onclick="navigateBackToVotes()">← Back to Votes</button>
      
      <div class="motion-header">
        <h2>${motion.title}</h2>
        <p class="motion-date">${new Date(motion.date).toLocaleDateString()}</p>
      </div>

      <div class="motion-info">
        <p class="summary">${motion.summary}</p>
        <p class="details">${motion.details}</p>
      </div>

      <div class="results-summary">
        <h3>Results</h3>
        <p class="result-badge ${motion.result.toLowerCase()}">${motion.result}</p>
        <div class="vote-breakdown">
          <div class="vote-stat">
            <span class="vote-count for">${motion.votes.for}</span>
            <span class="vote-label">Voted For</span>
          </div>
           <div class="vote-stat">
            <span class="vote-count abstain">${motion.votes.abstain}</span>
             <span class="vote-label">Abstained</span>
          </div>
            <div class="vote-stat">
             <span class="vote-count against">${motion.votes.against}</span>
            <span class="vote-label">Voted Against</span>
          </div>
        </div>
      </div>

      <div class="councillor-votes">
        <h3>How Each Councillor Voted</h3>
        ${breakdownHTML}
      </div>
    </div>
  `;
}

// ============================================
// RENDER LOGIC
// ============================================
function render() {
  const container = document.getElementById('votes-container');
  let html;

  if (currentView === "recent-votes") {
    html = renderRecentVotes();
  } else if (currentView === "motion-detail") {
    html = renderMotionDetail();
  }

  container.innerHTML = html;
}

// Initial render
render();

</script>

</body>
</html>
